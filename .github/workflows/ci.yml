name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Debug build
        run: swift build --product BenBenBen

      - name: Release build
        run: swift build -c release --product BenBenBen

      - name: Standard SwiftPM tests
        run: swift test

      - name: Runtime tests
        run: ./Scripts/test-runtime.sh

      - name: Shell syntax
        run: |
          bash -n Scripts/build_and_run.sh Scripts/copy-runtime.sh Scripts/embed-login-helper.sh Scripts/install-keyoti-agent-guide.sh Scripts/install-runtime.sh Scripts/package-app.sh Scripts/notarize-app.sh Scripts/test-runtime.sh
          find Scripts/benshell -type f ! -name Brewfile -exec /bin/zsh -n {} +
          /bin/zsh -n Runtime/install.zsh
          python -m py_compile Runtime/bin/benbenben Runtime/bin/benbenben-mcp Scripts/process-mascot-assets.py

      - name: Package ad hoc app
        run: APP_DIR="$RUNNER_TEMP/BenBenBen.app" COPY_TO_APPLICATIONS=0 ./Scripts/package-app.sh

      - name: Validate ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent "$RUNNER_TEMP/BenBenBen.app" "$RUNNER_TEMP/BenBenBen.zip"
          unzip -t "$RUNNER_TEMP/BenBenBen.zip"
